name: Feature request
description: Suggest something new, or a change to existing behavior.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: >
        Describe the problem, not just the feature you have in mind — the "why" is what
        actually helps evaluate whether it fits the project's scope (a free, federated,
        email-driven publishing network for artists) before anyone writes code.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution (optional)
      description: If you have a specific approach in mind, describe it here — but the problem statement above matters more than this.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other ways you've thought about solving this, or workarounds you're using today.
    validations:
      required: false
